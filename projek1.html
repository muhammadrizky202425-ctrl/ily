<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hand Tracking - I Love You with Heart Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 2; }
        #video {
            position: absolute; bottom: 20px; right: 20px;
            width: 180px; height: 135px;
            border: 2px solid #ee5282; border-radius: 10px;
            z-index: 1; transform: scaleX(-1); opacity: 0.3;
        }
        .status {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            color: #ee5282; font-family: 'Courier New', Courier, monospace;
            z-index: 10; font-size: 18px; font-weight: bold; text-shadow: 0 0 10px #ee5282;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="status" id="status">WAITING FOR CAMERA...</div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const videoElement = document.getElementById("video");
        const statusText = document.getElementById("status");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        let handX = null;
        let handY = null;

        // --- 1. FUNGSI UNTUK MENGGAMBAR BENTUK HATI (LOVE) ---
        function drawHeart(x, y, size, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            // Algoritma kurva Bezier untuk membentuk hati
            ctx.moveTo(x, y + size / 4);
            ctx.bezierCurveTo(x, y, x - size / 2, y, x - size / 2, y + size / 4);
            ctx.bezierCurveTo(x - size / 2, y + size / 2, x, y + size * 0.75, x, y + size);
            ctx.bezierCurveTo(x, y + size * 0.75, x + size / 2, y + size / 2, x + size / 2, y + size / 4);
            ctx.bezierCurveTo(x + size / 2, y, x, y, x, y + size / 4);
            ctx.closePath();
            ctx.fill();
        }

        // --- 2. LOGIKA PEMBENTUKAN TULISAN ---
        function createTextPixels() {
            ctx.fillStyle = "white";
            // Sesuaikan ukuran font berdasarkan lebar layar agar responsif
            const fontSize = Math.min(window.innerWidth * 0.15, 150);
            ctx.font = `bold ${fontSize}px Arial`;
            ctx.textAlign = "center";
            ctx.fillText("I LOVE YOU", canvas.width / 2, canvas.height / 2);
            
            // Ambil data pixel dari canvas
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            return data;
        }

        // --- 3. CLASS PARTIKEL (DENGAN LOGIKA BENTUK HATI) ---
        class Particle {
            constructor(x, y) {
                // Posisi awal acak
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                
                // Posisi tujuan (koordinat huruf)
                this.destX = x;
                this.destY = y;
                
                // Ukuran dan Fisika
                this.size = Math.random() * 5 + 3; // Ukuran bervariasi
                this.vx = 0;
                this.vy = 0;
                this.friction = 0.92; // Sedikit lebih lambat agar halus
                this.springFactor = 0.12;
                this.color = '#ee5282'; // Warna pink khas
                
                // Tentukan acak apakah partikel ini berbentuk hati atau titik
                this.isHeart = Math.random() > 0.6; // 40% kemungkinan berbentuk hati
            }

            draw() {
                if (this.isHeart) {
                    // Gambar hati menggunakan fungsi khusus
                    drawHeart(this.x, this.y, this.size * 2, this.color);
                } else {
                    // Gambar titik biasa
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            update() {
                // Gaya Pegas (Kembali ke bentuk tulisan)
                let dx = this.destX - this.x;
                let dy = this.destY - this.y;
                this.vx += dx * this.springFactor;
                this.vy += dy * this.springFactor;
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.x += this.vx;
                this.y += this.vy;

                // Interaksi Tangan (Efek Mengacak-acak)
                if (handX != null && handY != null) {
                    let hx = handX - this.x;
                    let hy = handY - this.y;
                    let dist = Math.sqrt(hx * hx + hy * hy);
                    // Jarak interaksi jari (120px)
                    if (dist < 120) {
                        let angle = Math.atan2(hy, hx);
                        // Kekuatan lemparan (pentalan)
                        let force = 20; 
                        this.vx -= Math.cos(angle) * force;
                        this.vy -= Math.sin(angle) * force;
                    }
                }
            }
        }

        function init() {
            particlesArray = [];
            const pixelData = createTextPixels();
            
            // Tentukan kerapatan pixel berdasarkan performa layar
            const density = Math.min(window.innerWidth, window.innerHeight) > 1000 ? 10 : 8;

            // Scan pixel canvas, jika ada warna (text), buat partikel di sana
            for (let y = 0; y < pixelData.height; y += density) {
                for (let x = 0; x < pixelData.width; x += density) {
                    // Indeks pixel dalam array data (RGBA)
                    const index = (y * 4 * pixelData.width) + (x * 4) + 3;
                    // Jika pixel tidak transparan (bagian dari huruf), buat partikel
                    if (pixelData.data[index] > 128) {
                        particlesArray.push(new Particle(x, y));
                    }
                }
            }
        }

        function animate() {
            // Hapus canvas setiap frame
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Tambahkan efek Additive Blending agar partikel bersinar saat bertumpuk
            ctx.globalCompositeOperation = 'lighter';
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            
            // Kembalikan blending mode ke normal
            ctx.globalCompositeOperation = 'source-over';
            
            requestAnimationFrame(animate);
        }

        // --- 4. SETUP AI HAND TRACKING ---
        const hands = new Hands({
            locateFile: (file) => `
