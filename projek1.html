<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I LOVE YOU - AI Hand Tracking</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 2; }
        #video {
            position: absolute; bottom: 20px; right: 20px;
            width: 160px; height: 120px;
            border: 2px solid #ee5282; border-radius: 10px;
            z-index: 1; transform: scaleX(-1); opacity: 0.5;
        }
        .instructions {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            color: #ee5282; font-family: Arial; z-index: 10;
            text-align: center; font-weight: bold; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="instructions" id="status">Menginisialisasi Kamera AI...</div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const videoElement = document.getElementById("video");
        const statusText = document.getElementById("status");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        let handX = null;
        let handY = null;

        // --- FUNGSI GAMBAR HATI ---
        function drawHeart(x, y, size, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.bezierCurveTo(x, y - size / 2, x - size, y - size / 2, x - size, y);
            ctx.bezierCurveTo(x - size, y + size / 2, x, y + size, x, y + size);
            ctx.bezierCurveTo(x, y + size, x + size, y + size / 2, x + size, y);
            ctx.bezierCurveTo(x + size, y - size / 2, x, y - size / 2, x, y);
            ctx.fill();
        }

        // --- LOGIKA SCAN TEKS ---
        function getTextCoordinates() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            const fontSize = Math.min(canvas.width * 0.12, 140);
            ctx.font = `bold ${fontSize}px sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("I LOVE YOU", canvas.width / 2, canvas.height / 2);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const coords = [];
            // Scan pixel tiap 10px agar performa enteng
            for (let y = 0; y < canvas.height; y += 10) {
                for (let x = 0; x < canvas.width; x += 10) {
                    if (imageData.data[(y * 4 * canvas.width) + (x * 4) + 3] > 128) {
                        coords.push({ x, y });
                    }
                }
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            return coords;
        }

        class Particle {
            constructor(targetX, targetY) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.targetX = targetX;
                this.targetY = targetY;
                this.size = Math.random() * 4 + 2;
                this.vx = 0;
                this.vy = 0;
                this.isHeart = Math.random() > 0.7; // 30% jadi bentuk hati
            }

            draw() {
                if (this.isHeart) {
                    drawHeart(this.x, this.y, this.size * 2, "#ee5282");
                } else {
                    ctx.fillStyle = "#ff74a4";
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            update() {
                // Balik ke posisi tulisan (Spring effect)
                let dx = this.targetX - this.x;
                let dy = this.targetY - this.y;
                this.vx += dx * 0.05;
                this.vy += dy * 0.05;
                this.vx *= 0.85;
                this.vy *= 0.85;
                this.x += this.vx;
                this.y += this.vy;

                // Interaksi Jari
                if (handX && handY) {
                    let hdx = this.x - handX;
                    let hdy = this.y - handY;
                    let dist = Math.sqrt(hdx*hdx + hdy*hdy);
                    if (dist < 100) {
                        this.vx += hdx * 0.5;
                        this.vy += hdy * 0.5;
                    }
                }
            }
        }

        function init() {
            const points = getTextCoordinates();
            particlesArray = points.map(p => new Particle(p.x, p.y));
        }

        function animate() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.2)"; // Trail effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            particlesArray.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        // --- TRACKING TANGAN ---
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(results => {
            statusText.innerText = "SISTEM AKTIF - GERAKKAN JARIMU DI ATAS TULISAN";
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmark = results.multiHandLandmarks[0][8]; // Ujung jari telunjuk
                handX = (1 - landmark.x) * canvas.width;
                handY = landmark.y * canvas.height;
            } else {
                handX = null; handY = null;
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        camera.start();

        init();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });
    </script>
</body>
</html>
